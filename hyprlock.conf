general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
    ignore_empty_input = true
  }

background {
    monitor = eDP-1
    path = ~/Pictures/miku.png
    blur_passes = 3
    blur_size = 7
    brightness = 0.8
  }

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    outer_color = rgb(151515)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 64
    font_family = JetBrains Mono
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    font_size = 20
    position = 0, -140
    halign = center
    valign = center
}
